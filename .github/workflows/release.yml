name: Release tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version from package.json (and verify the tag matches)
        id: pkg
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: npm test

      - name: Package extension
        run: npx --yes @vscode/vsce@3 package --no-yarn -o "ridl-vscode-${{ steps.pkg.outputs.version }}.vsix"

      - name: Create GitHub release and attach VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: ridl-vscode-*.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx --yes @vscode/vsce@3 publish --packagePath "ridl-vscode-${{ steps.pkg.outputs.version }}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
